<div class="bg-white rounded-[2rem] p-8 shadow-sm border border-slate-100 mb-10">
  <h2 class="font-black uppercase tracking-widest text-sm mb-6 text-slate-900">
    2. Choisir l'heure du match
  </h2>

  <mat-form-field class="w-full" appearance="outline">
    <mat-label>Heure de début</mat-label>
    <input matInput
           [matTimepicker]="picker"
           [(ngModel)]="selectedTime"
           (ngModelChange)="onTimeChange($event)">
    <mat-timepicker-toggle matIconSuffix [for]="picker"></mat-timepicker-toggle>
    <mat-timepicker #picker></mat-timepicker>
  </mat-form-field>
</div>
