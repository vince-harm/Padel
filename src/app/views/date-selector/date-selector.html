<div class="mt-20 mb-10 max-w-full overflow-hidden">
  <h2 class="px-6 font-black uppercase tracking-widest text-[10px] mb-6 text-slate-400">
    1. Choisir la date (Dispo 3 semaines)
  </h2>

  <div class="date-strip-container mt-12 mb-8 flex overflow-x-auto gap-4 px-6 md:px-0 pb-6 snap-x snap-mandatory">
    @for (day of daysList(); track day.date.getTime()) {
      <button
        (click)="selectDate(day.date)"
        [ngClass]="isSelected(day.date) ? 'flex-shrink-0 w-20 md:w-24 h-28 md:h-32 flex flex-col items-center justify-center rounded-2xl border-2 transition-all duration-300 snap-start cursor-pointer bg-emerald-500 border-emerald-500 text-white shadow-lg scale-105' : 'flex-shrink-0 w-20 md:w-24 h-28 md:h-32 flex flex-col items-center justify-center rounded-2xl border-2 transition-all duration-300 snap-start cursor-pointer bg-white border-slate-100 text-slate-900 shadow-sm hover:border-slate-300'">

        <span class="text-[10px] font-bold uppercase tracking-widest opacity-60 mb-1">{{ day.dayName }}</span>
        <span class="text-2xl font-black my-1">{{ day.dayNumber }}</span>
        <span class="text-[9px] font-black uppercase tracking-wider">{{ day.monthName }}</span>

      </button>
    }
  </div>
</div>
